services:
  db:
    image: postgres:16-alpine
    container_name: bakery-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evershop
      POSTGRES_PASSWORD: evershop123
      POSTGRES_DB: evershop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evershop -d evershop"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: node:20-alpine
    container_name: bakery-app
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: evershop
      DB_USER: evershop
      DB_PASSWORD: evershop123
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: >
      sh -c "
        npm install &&
        cd extensions/sweetdreambakery && npm install && npm run compile && cd ../.. &&
        cd themes/sweetdreambakery && npm install && npm run build && cd ../.. &&
        npm run dev
      "

volumes:
  postgres_data:
  node_modules:
