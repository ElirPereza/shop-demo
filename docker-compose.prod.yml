services:
  db:
    image: postgres:16-alpine
    container_name: bakery-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-evershop}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-evershop123}
      POSTGRES_DB: ${DB_NAME:-evershop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-evershop} -d ${DB_NAME:-evershop}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bakery-app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-evershop}
      DB_USER: ${DB_USER:-evershop}
      DB_PASSWORD: ${DB_PASSWORD:-evershop123}
      NODE_ENV: production
    ports:
      - "${PORT:-3000}:3000"

volumes:
  postgres_data:
